name: Sync to Gitee

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g., v0.4.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Get GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ inputs.tag }}
          echo "Fetching release $TAG from GitHub..."
          
          mkdir -p artifacts
          gh release download "$TAG" --repo yockii/wangshu --dir artifacts
          
          echo "Downloaded files:"
          ls -la artifacts/

      - name: Sync Release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG=${{ inputs.tag }}
          echo "Syncing release ${TAG} to Gitee..."
          
          RELEASE_ID=$(curl -s "https://gitee.com/api/v5/repos/yockii/wangshu/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
          
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Creating new release..."
            RESPONSE=$(curl -s -X POST "https://gitee.com/api/v5/repos/yockii/wangshu/releases" \
              -H "Content-Type: application/json" \
              -d "{
                \"access_token\": \"${GITEE_TOKEN}\",
                \"tag_name\": \"${TAG}\",
                \"name\": \"${TAG}\",
                \"body\": \"请查看 GitHub Release 页面获取详细更新说明: https://github.com/yockii/wangshu/releases/tag/${TAG}\",
                \"draft\": false,
                \"prerelease\": false
              }")
            echo "Response: $RESPONSE"
            RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
          fi
          
          echo "Release ID: $RELEASE_ID"
          
          echo "Uploading attachments..."
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              filesize=$(stat -c%s "$file")
              echo "Uploading $filename ($filesize bytes)..."
              for attempt in 1 2 3; do
                RESPONSE=$(curl -s -w "\n%{http_code}" --connect-timeout 30 --max-time 300 -X POST \
                  "https://gitee.com/api/v5/repos/yockii/wangshu/releases/${RELEASE_ID}/attach_files" \
                  -F "access_token=${GITEE_TOKEN}" \
                  -F "file=@${file}")
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                BODY=$(echo "$RESPONSE" | sed '$d')
                if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                  echo "Success: $filename (HTTP $HTTP_CODE)"
                  break
                else
                  echo "Attempt $attempt failed for $filename (HTTP $HTTP_CODE): $BODY"
                  if [ "$attempt" -lt 3 ]; then
                    echo "Retrying in 5 seconds..."
                    sleep 5
                  fi
                fi
              done
            fi
          done
          
          echo "Sync completed."
